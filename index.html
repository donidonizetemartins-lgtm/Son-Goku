<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Onipresente</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ssj4-red: #ff0000;
            --ssj4-dark-red: #8b0000;
            --ssj4-orange: #ff8c00; 
            --ssj4-gold: #ffd700;
            --ssj4-black: #0a0a0a;
            --ssj4-dark: #111;
            --glass: rgba(20, 20, 20, 0.95);
            --border-futuristic: 1px solid rgba(255, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        
        html, body { 
            background-color: var(--ssj4-black); 
            color: white; 
            overflow: hidden; 
            height: 100%; 
            width: 100vw; 
            display: flex; 
            justify-content: center;
        }

        #mobile-container { 
            width: 100%; 
            max-width: 450px; 
            height: 100dvh; 
            background: linear-gradient(135deg, #000 0%, #1a0000 100%); 
            position: relative; 
            border-left: 1px solid var(--ssj4-red); 
            border-right: 1px solid var(--ssj4-red); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        .icon-btn {
            background: transparent !important;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            outline: none;
        }

        .svg-icon { width: 28px; height: 28px; fill: none; stroke: var(--ssj4-orange); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 5px var(--ssj4-orange)); }
        
        /* SPLASH ORIGINAL RECUPERADO */
        #splash-screen { position: absolute; inset: 0; z-index: 1000; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1); }
        .ssj4-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--ssj4-red); text-shadow: 0 0 15px var(--ssj4-red); animation: pulse 2s infinite; }
        .onipresente-text { font-size: 1.2rem; letter-spacing: 8px; color: var(--ssj4-gold); margin-bottom: 20px; }
        .loader-bar { width: 0%; height: 6px; background: linear-gradient(90deg, var(--ssj4-red), var(--ssj4-gold)); box-shadow: 0 0 10px var(--ssj4-red); animation: fillBar 4.5s forwards; }

        #auth-screen { display: none; padding: 20px; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .profile-upload { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--ssj4-red); background: #111; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 20px; overflow: hidden; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        .auth-input { width: 80%; padding: 12px; margin: 10px 0; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--ssj4-dark-red); border-radius: 5px; color: white; outline: none; }
        .btn-ssj4 { width: 80%; padding: 15px; background: var(--ssj4-red); border: none; color: white; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); transition: 0.3s; }
        
        #app-screen { display: none; flex-direction: column; height: 100%; width: 100%; }
        .header { height: 25%; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; background: url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60') center/cover; border-bottom: 2px solid var(--ssj4-red); }
        .header-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); }
        .top-icons { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 3; }
        
        .chat-container { flex: 1; background: var(--ssj4-black); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .message { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border-left: 3px solid var(--ssj4-dark-red); animation: enterMsg 0.3s ease-out; }
        .msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; position: relative;}
        .msg-avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--ssj4-gold); object-fit: cover; cursor: pointer; }
        .msg-name { font-weight: bold; font-size: 0.95rem; color: var(--ssj4-gold); font-family: 'Orbitron', sans-serif; }
        .msg-time { font-size: 0.65rem; color: #777; margin-left: auto; }
        .admin-delete-btn { color: var(--ssj4-red); font-size: 0.7rem; border: 1px solid var(--ssj4-red); padding: 2px; margin-left: 5px; border-radius: 3px; cursor: pointer; }

        .chat-input-area { padding: 15px 15px 95px 15px; background: var(--ssj4-dark); display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; z-index: 10; }
        #chat-msg-input { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 5px; color: white; outline: none; }

        .futuristic-panel { position: absolute; bottom: -110%; left: 0; width: 100%; height: 85%; background: var(--glass); backdrop-filter: blur(10px); z-index: 200; border-top: 2px solid var(--ssj4-orange); border-radius: 20px 20px 0 0; padding: 20px; transition: bottom 0.5s cubic-bezier(0.17, 0.84, 0.44, 1); display: flex; flex-direction: column; }
        .futuristic-panel.active { bottom: 0; }
        .panel-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; margin-top: 20px;}
        .news-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; border-left: 3px solid var(--ssj4-orange); position: relative; margin-bottom: 10px;}
        .poll-btn { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; text-align: left; margin-top: 5px; border-radius: 4px; }

        #alert-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #111; border: 2px solid var(--ssj4-red); padding: 20px; z-index: 3000; text-align: center; border-radius: 10px; transition: 0.3s; width: 280px; }
        #alert-modal.active { transform: translate(-50%, -50%) scale(1); }

        @keyframes fillBar { from { width: 0%; } to { width: 100%; } }
        @keyframes enterMsg { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="mobile-container">
    <svg style="display: none;">
        <symbol id="icon-news" viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10l4 4v10a2 2 0 0 1-2 2z"></path><path d="M7 8h6"></path><path d="M7 12h10"></path></symbol>
        <symbol id="icon-admin" viewBox="0 0 24 24"><path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"></path></symbol>
        <symbol id="icon-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></symbol>
        <symbol id="icon-send" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polyline points="22 2 15 22 11 13 2 9 22 2"></polyline></symbol>
        <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></symbol>
        <symbol id="icon-flower" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path></symbol>
        <symbol id="icon-rank" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></symbol>
        <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></symbol>
    </svg>

    <div id="splash-screen">
        <h1 class="ssj4-title">SON GOKU</h1>
        <p class="onipresente-text">O ONIPRESENTE</p>
        <p class="obs-text">Obs: Adm Vai Libera O Caneco Um Dia...</p>
        <div style="width:70%; background: #222; height: 6px; border-radius: 10px; overflow: hidden; border: 1px solid var(--ssj4-dark-red);"><div class="loader-bar"></div></div>
        <p style="margin-top:15px; font-size:0.9rem; color:var(--ssj4-gold); font-weight:bold">By: Goat</p>
    </div>

    <div id="auth-screen">
        <h2 id="auth-title" style="color:var(--ssj4-gold); margin-bottom:20px; font-family:'Orbitron'">REGISTRAR</h2>
        <div class="profile-upload" onclick="document.getElementById('file-input').click()">
            <img id="preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="previewImage(this)">
        <input type="text" id="user-name" class="auth-input" placeholder="Nome do Guerreiro">
        <input type="password" id="user-pass" class="auth-input" placeholder="Senha">
        <button class="btn-ssj4" onclick="handleAuth()">Confirmar</button>
        <p onclick="toggleAuthMode()" style="cursor:pointer; margin-top:15px; color:#666; font-size:0.9rem">Já tenho conta? Login</p>
    </div>

    <div id="app-screen">
        <div class="header">
            <div class="header-overlay"></div>
            <div class="top-icons">
                <button class="icon-btn" onclick="openPanel('news-panel')"><svg class="svg-icon"><use xlink:href="#icon-news"></use></svg></button>
                <div style="display:flex; gap:10px">
                    <button class="icon-btn" onclick="openPanel('rank-panel')"><svg class="svg-icon"><use xlink:href="#icon-rank"></use></svg></button>
                    <button class="icon-btn" onclick="toggleAdminPanel()"><svg class="svg-icon"><use xlink:href="#icon-admin"></use></svg></button>
                </div>
            </div>
            <div style="z-index:2; text-align:center">
                <h2 style="font-family:'Orbitron'; color:var(--ssj4-red)">COMUNIDADE</h2>
                <p style="color:var(--ssj4-gold)">DO ONIPRESENTE</p>
            </div>
        </div>

        <div class="chat-container">
            <div id="chat-messages"></div>
            <div class="chat-input-area">
                <button class="icon-btn" onclick="document.getElementById('chat-file').click()"><svg class="svg-icon" style="width:22px"><use xlink:href="#icon-image"></use></svg></button>
                <input type="file" id="chat-file" class="hidden" accept="image/*" onchange="chatFileSelected()">
                <input type="text" id="chat-msg-input" placeholder="Mensagem...">
                <button class="icon-btn" onclick="sendMessage()"><svg class="svg-icon" style="stroke:var(--ssj4-red)"><use xlink:href="#icon-send"></use></svg></button>
            </div>
        </div>

        
<div id="rank-panel" class="futuristic-panel">
            <h3 style="color:var(--ssj4-gold); font-family:'Orbitron'">TOP 10 GUERREIROS</h3>
            <div id="rank-list" class="panel-content"></div>
            <button class="btn-ssj4" style="width:100%" onclick="closePanels()">FECHAR</button>
        </div>

        <div id="news-panel" class="futuristic-panel">
            <h3 style="color:var(--ssj4-gold)">NOTÍCIAS E ENQUETES</h3>
            <div id="news-content-list" class="panel-content"></div>
            <button class="btn-ssj4" style="width:100%" onclick="closePanels()">FECHAR</button>
        </div>

        <div id="admin-panel" class="futuristic-panel">
            <h3 style="color:var(--ssj4-red)">PAINEL ADMIN</h3>
            <div class="panel-content">
                <div id="admin-login-prompt">
                    <input type="password" id="admin-pass-input" class="auth-input" style="width:100%" placeholder="Senha Admin">
                    <button class="btn-ssj4" style="width:100%" onclick="checkAdminPass()">LOGAR ADM</button>
                </div>
                <div id="admin-tools" class="hidden">
                    <input type="text" id="news-title" class="auth-input" style="width:100%" placeholder="Título">
                    <textarea id="news-body" class="auth-input" style="width:100%; height:60px" placeholder="Mensagem"></textarea>
                    <button class="btn-ssj4" style="width:100%; margin-bottom:10px;" onclick="publishNews()">POSTAR NOTÍCIA</button>
                    <hr>
                    <input type="text" id="poll-q" class="auth-input" style="width:100%" placeholder="Pergunta Enquete">
                    <button class="btn-ssj4" style="width:100%; background:var(--ssj4-gold); color:black" onclick="publishPoll()">CRIAR ENQUETE</button>
                </div>
            </div>
            <button class="btn-ssj4" style="width:100%; background:#333" onclick="closePanels()">VOLTAR</button>
        </div>

        
<div id="profile-panel" class="futuristic-panel">
            <div id="profile-content" class="panel-content" style="align-items:center; text-align:center">
                
</div>
            <button class="btn-ssj4" onclick="closePanels()">VOLTAR</button>
        </div>

        
<div id="alert-modal">
            <p style="color:var(--ssj4-red); font-weight:bold; margin-bottom:15px;">ACESSO NEGADO</p>
            <p style="font-size:0.9rem; margin-bottom:15px;">Somente Administradores podem dar Flores.</p>
            <button class="btn-ssj4" style="padding:10px; width:50px" onclick="closeAlert()">X</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCkzu5uIY88m2WbLXTaczE_feBYPNUnHBo", authDomain: "songoku-9b831.firebaseapp.com", projectId: "songoku-9b831", storageBucket: "songoku-9b831.firebasestorage.app", messagingSenderId: "188094830557", appId: "1:188094830557:web:451b0be3fd5646c32ac834" };

    let db;
    try { const app = firebase.initializeApp(firebaseConfig); db = firebase.firestore(app); db.settings({ experimentalForceLongPolling: true }); console.log("Firebase Conectado!"); } catch(e) { console.error(e); }

    let currentUser = null;
    let isAdminAuthenticated = false;
    let selectedChatFileBase64 = null;
    let authMode = "REGISTRAR";

    setTimeout(() => { document.getElementById('splash-screen').style.transform = 'translateY(-100%)'; document.getElementById('auth-screen').style.display = 'flex'; }, 5000);

    function toggleAuthMode() {
        authMode = authMode === "REGISTRAR" ? "LOGIN" : "REGISTRAR";
        document.getElementById('auth-title').innerText = authMode;
        document.getElementById('profile-upload-container').style.display = authMode === "LOGIN" ? "none" : "flex";
    }
    
    function previewImage(i) { if (i.files && i.files[0]) { let r = new FileReader(); r.onload = (e) => { document.getElementById('preview').src = e.target.result; }; r.readAsDataURL(i.files[0]); } }

    async function handleAuth() {
        const name = document.getElementById('user-name').value;
        const pass = document.getElementById('user-pass').value;
        if(name.length < 3) return alert("Nome curto!");
        if(pass.length < 4) return alert("Senha curta!");

        if(authMode === "REGISTRAR") {
            const userRef = db.collection("usuarios").doc(name);
            const doc = await userRef.get();
            if(doc.exists) return alert("Nome de guerreiro já existe!");
            
            currentUser = { name, pass, img: document.getElementById('preview').src, posts: 0 };
            await userRef.set(currentUser);
        } else {
            const doc = await db.collection("usuarios").doc(name).get();
            if(!doc.exists || doc.data().pass !== pass) return alert("Dados de guerreiro incorretos!");
            currentUser = doc.data();
        }
        
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app-screen').style.display = 'flex';
        
        // MENSAGEM DO SISTEMA ORIGINAL RECUPERADA
        addLocalMessage("SISTEMA", "https://cdn-icons-png.flaticon.com/512/9131/9131529.png", `Seja Bem Vindo Ao Clã Do Onipresente, ${name}!`);
        
        if(db) { initChat(); initNews(); updateRanking(); }
    }

    function addLocalMessage(n, i, t) {
        const chat = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'message';
        div.style.borderLeftColor = 'var(--ssj4-gold)';
        div.innerHTML = `<div class="msg-header"><img src="${i}" class="msg-avatar"><span class="msg-name" style="color:var(--ssj4-gold)">${n}</span></div><div class="msg-body">${t}</div>`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function initChat() {
        db.collection("mensagens").orderBy("timestamp", "asc").onSnapshot(s => {
            document.getElementById('chat-messages').innerHTML = "";
            addLocalMessage("SISTEMA", "https://cdn-icons-png.flaticon.com/512/9131/9131529.png", `Seja Bem Vindo Ao Clã Do Onipresente!`);
            s.forEach(doc => {
                const m = doc.data();
                const time = m.timestamp ? new Date(m.timestamp.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '--:--';
                renderMsg(m.name, m.img, m.text, m.imageBase64, doc.id, time, m.likedBy || [], m.flowers || 0);
            });
            const chatBox = document.getElementById('chat-messages');
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    function renderMsg(n, i, t, img, id, time, likedBy, flowers) {
        const chat = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = 'message';
        
        const hasLiked = likedBy.includes(currentUser.name);
        let del = isAdminAuthenticated ? `<button class="icon-btn" onclick="deleteMsg('${id}')"><svg class="svg-icon" style="width:16px; height:16px; stroke:red"><use xlink:href="#icon-trash"></use></svg></button><button class="icon-btn" onclick="banUser('${n}')" style="color:red; font-size:0.6rem; border:1px solid red; padding:2px">BAN</button>` : '';
        
        div.innerHTML = `
            <div class="msg-header">
                <img src="${i}" class="msg-avatar" onclick="openProfile('${n}')">
                <span class="msg-name">${n}</span>
                ${del}
                <span class="msg-time">${time}</span>
            </div>
            <div class="msg-body">
                ${t || ""} 
                ${img ? `<br><img src="${img}" style="max-width:100%; border-radius:8px; margin-top:8px; border: 1px solid var(--ssj4-dark-red)">` : ''}
            </div>
            <div class="msg-actions" style="display:flex; gap:15px; margin-top:10px; border-top:1px solid rgba(255,255,255,0.05); padding-top:8px">
                <button class="icon-btn" onclick="likeMsg('${id}', ${hasLiked})">
                    <svg class="svg-icon" style="width:18px; height:18px; stroke: ${hasLiked ? 'var(--ssj4-red)' : '#666'}"><use xlink:href="#icon-heart"></use></svg>
                </button>
                <span style="font-size:0.8rem; color:var(--ssj4-gold); margin-left:-8px">${likedBy.length}</span>
                
                <button class="icon-btn" onclick="tryFlower('${id}')">
                    <svg class="svg-icon" style="width:18px; height:18px; stroke: var(--ssj4-gold)"><use xlink:href="#icon-flower"></use></svg>
                </button>
                <span style="font-size:0.8rem; color:var(--ssj4-gold); margin-left:-8px">${flowers}</span>
            </div>
        `;
        chat.appendChild(div);
    }

    async function sendMessage() {
        const input = document.getElementById('chat-msg-input');
        if(!input.value && !selectedChatFileBase64) return;
        if(db) {
            db.collection("mensagens").add({ name: currentUser.name, img: currentUser.img, text: input.value, imageBase64: selectedChatFileBase64, likedBy: [], flowers: 0, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            // Incrementar posts para o ranking
            db.collection("usuarios").doc(currentUser.name).update({ posts: firebase.firestore.FieldValue.increment(1) });
        }
        input.value = ""; selectedChatFileBase64 = null;
    }

    function chatFileSelected() { const f = document.getElementById('chat-file').files[0]; if(f) { const r = new FileReader(); r.onload = (e) => { selectedChatFileBase64 = e.target.result; alert("Arquivo pronto!"); }; r.readAsDataURL(f); } }

    function openPanel(id) { closePanels(); setTimeout(() => { document.getElementById(id).classList.add('active'); }, 50); }
    function toggleAdminPanel() { closePanels(); setTimeout(() => { document.getElementById('admin-panel').classList.add('active'); }, 50); }
    function closePanels() { document.querySelectorAll('.futuristic-panel').forEach(p => p.classList.remove('active')); }

    function checkAdminPass() {
        if(document.getElementById('admin-pass-input').value === "2012") {
            isAdminAuthenticated = true;
            document.getElementById('admin-login-prompt').classList.add('hidden');
            document.getElementById('admin-tools').classList.remove('hidden');
            alert("Acesso Supremo Liberado!");
            initChat(); initNews(); // Recarregar para mostrar botões de apagar
        }
    }

    async function publishNews() {
        const t = document.getElementById('news-title').value;
        const b = document.getElementById('news-body').value;
        if(db && t) { 
            await db.collection("noticias").add({ title: t, body: b, type: 'news', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            closePanels(); document.getElementById('news-title').value = ""; document.getElementById('news-body').value = "";
        }
    }

    async function publishPoll() {
        const q = document.getElementById('poll-q').value;
        if(db && q) { 
            await db.collection("noticias").add({ title: q, type: 'poll', timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            closePanels(); document.getElementById('poll-q').value = "";
        }
    }

    function initNews() {
        db.collection("noticias").orderBy("timestamp", "desc").onSnapshot(s => {
            const list = document.getElementById('news-content-list');
            list.innerHTML = "";
            s.forEach(doc => {
                const n = doc.data();
                const div = document.createElement('div');
                div.className = 'news-item';
                div.style.borderLeftColor = n.type === 'poll' ? 'var(--ssj4-gold)' : 'var(--ssj4-red)';
                
                let del = isAdminAuthenticated ? `<button class="icon-btn" style="position:absolute; right:10px; top:10px" onclick="deleteDoc('noticias','${doc.id}')"><svg class="svg-icon" style="width:16px; height:16px; stroke:red"><use xlink:href="#icon-trash"></use></svg></button>` : '';

                if(n.type === 'poll') {
                    div.innerHTML = `<h4>ENQUETE: ${n.title}</h4><button class="poll-btn">CONCORDO</button><button class="poll-btn">DISCORDO</button>${del}`;
                } else {
                    div.innerHTML = `<h4 style="color:var(--ssj4-red)">${n.title}</h4><p>${n.body}</p>${del}`;
                }
                list.appendChild(div);
            });
        });
    }

    function updateRanking() {
        db.collection("usuarios").orderBy("posts", "desc").limit(10).onSnapshot(s => {
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            let i = 1;
            s.forEach(doc => {
                const r = doc.data();
                div = document.createElement('div');
                div.style = "display:flex; align-items:center; gap:15px; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; border:1px solid rgba(255,215,0,0.1); margin-bottom:5px";
                div.innerHTML = `
                    <span style="font-family:'Orbitron'; color:var(--ssj4-red); font-size:1.2rem; min-width:30px">#${i++}</span>
                    <img src="${r.img}" class="msg-avatar" onclick="openProfile('${r.name}')">
                    <div style="flex:1">
                        <div class="msg-name">${r.name}</div>
                        <div style="font-size:0.8rem; color: #aaa">${r.posts} Postagens</div>
                    </div>
                `;
                list.appendChild(div);
            });
        });
    }

    async function openProfile(name) {
        const doc = await db.collection("usuarios").doc(name).get();
        if(!doc.exists) return;
        const u = doc.data();
        const pContent = document.getElementById('profile-content');
        
        pContent.innerHTML = `
            <img src="${u.img}" style="width:120px; height:120px; border-radius:50%; border:3px solid var(--ssj4-red); margin-bottom:15px; box-shadow: 0 0 15px var(--ssj4-red)">
            <h2 style="font-family:'Orbitron'; color:var(--ssj4-gold)">${u.name}</h2>
            <div style="display:flex; justify-content:center; gap:20px; margin:15px 0;">
                <div style="display:flex; align-items:center; gap:8px; color:#aaa">
                    <button class="icon-btn" onclick="likeProfile('${name}')"><svg class="svg-icon"><use xlink:href="#icon-heart"></use></svg></button>
                    <span>${u.profileLikes || 0} Likes</span>
                </div>
            </div>
            <div style="width:100%; text-align:left; margin-top:20px; border-top: 1px solid #333; padding-top:15px">
                <h4 style="color:var(--ssj4-red); margin-bottom:10px">Comentários</h4>
                <div id="profile-comments-list"></div>
                <div style="display:flex; gap:10px; margin-top:10px">
                    <input type="text" id="profile-comment-input" class="auth-input" style="flex:1" placeholder="Escreva...">
                    <button class="btn-ssj4" style="width:60px; margin-top:10px; padding:0" onclick="addProfileComment('${name}')">></button>
                </div>
            </div>
        `;
        openPanel('profile-panel');
        loadProfileComments(name);
    }

    async function likeProfile(name) {
        await db.collection("usuarios").doc(name).update({ profileLikes: firebase.firestore.FieldValue.increment(1) });
        alert("Guerreiro curtido!");
    }

    async function addProfileComment(name) {
        const input = document.getElementById('profile-comment-input');
        if(!input.value) return;
        await db.collection("usuarios").doc(name).collection("comentarios").add({
            from: currentUser.name,
            text: input.value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";
    }

    function loadProfileComments(name) {
        db.collection("usuarios").doc(name).collection("comentarios").orderBy("timestamp", "desc").onSnapshot(s => {
            const list = document.getElementById('profile-comments-list');
            if(!list) return;
            list.innerHTML = "";
            s.forEach(doc => {
                const c = doc.data();
                div = document.createElement('div');
                div.style = "background: rgba(255,255,255,0.03); padding:8px; border-radius:5px; margin-bottom:5px; position:relative";
                let del = (currentUser.name === name || isAdminAuthenticated) ? `<button class="icon-btn" style="position:absolute; right:5px; top:5px;" onclick="deleteComment('${name}','${doc.id}')"><svg class="svg-icon" style="width:14px; height:14px; stroke:red"><use xlink:href="#icon-trash"></use></svg></button>` : '';
                div.innerHTML = `<span style="color:var(--ssj4-gold); font-size:0.8rem">${c.from}</span><p style="font-size:0.9rem">${c.text}</p>${del}`;
                list.appendChild(div);
            });
        });
    }

    function likeMsg(id, hasLiked) {
        if(hasLiked) return alert("Você já curtiu este combate!");
        db.collection("mensagens").doc(id).update({ likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.name) });
    }

    function tryFlower(id) { if(!isAdminAuthenticated) { document.getElementById('alert-modal').classList.add('active'); } else { db.collection("mensagens").doc(id).update({ flowers: firebase.firestore.FieldValue.increment(1) }); } }
    function closeAlert() { document.getElementById('alert-modal').classList.remove('active'); }
    function deleteMsg(id) { if(confirm("Apagar mensagem?")) db.collection("mensagens").doc(id).delete(); }
    function deleteDoc(col, id) { if(confirm("Apagar postagem?")) db.collection(col).doc(id).delete(); }
    function deleteComment(user, id) { if(confirm("Apagar comentário?")) db.collection("usuarios").doc(user).collection("comentarios").doc(id).delete(); }
    async function banUser(name) { if(confirm(`Banir ${name}? Isso apaga a conta, o ranking e as mensagens.`)) { await db.collection("usuarios").doc(name).delete(); const msgs = await db.collection("mensagens").where("name", "==", name).get(); msgs.forEach(doc => doc.ref.delete()); alert("Guerreiro banido!"); } }
</script>
</body>
</html>
